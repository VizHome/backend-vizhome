name: CodeQL

# Analyse sémantique du code Python (Django + Celery + DRF + dj-stripe).
# Détecte injection SQL/template, désérialisation unsafe, secrets en dur,
# chemins traversés, requêtes SSRF, etc.
#
# Résultats : onglet Security > Code scanning du repo.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Re-scan hebdo (lundi 06:00 UTC).
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install deps (pour résolution des imports)
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
