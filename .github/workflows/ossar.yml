name: OSSAR

# Open Source Static Analysis Runner — wrapper Microsoft qui lance
# plusieurs outils SAST (DevSkim, Semgrep, BinSkim…) puis agrège en SARIF.
#
# ⚠️ Requiert un runner Windows.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: ossar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ossar-scan:
    name: OSSAR scan
    runs-on: windows-latest
    timeout-minutes: 30
    # OSSAR (Microsoft Guardian) est régulièrement instable sur les runners
    # GitHub-hosted (`guardian.cmd failed with exit code 1` aléatoires). Le
    # scan reste utile pour les findings positifs mais on évite de bloquer
    # le merge sur un échec d'infra.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OSSAR
        id: ossar
        continue-on-error: true
        uses: github/ossar-action@v1

      # Skip l'upload si OSSAR a planté (guardian.cmd exit 1 = sarifFile null,
      # pas '' donc on check `outcome == success` plutôt que le path).
      - name: Upload OSSAR results
        if: steps.ossar.outcome == 'success' && steps.ossar.outputs.sarifFile != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.ossar.outputs.sarifFile }}
          category: ossar-backend
