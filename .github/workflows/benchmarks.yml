name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "benchmarks/**"
      - "src/requirements*.txt"
      - ".github/workflows/benchmarks.yml"

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  microbench:
    name: Microbenchmarks (pytest-benchmark)
    runs-on: ubuntu-latest
    continue-on-error: true  # baseline pas encore stabilise : non bloquant
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vizhome
          POSTGRES_USER: vizhome
          POSTGRES_PASSWORD: vizhome
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vizhome"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth=2 pour pouvoir comparer au commit precedent si besoin
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: pip install -r src/requirements-dev.txt

      - name: Download previous baseline (if any)
        id: download-baseline
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: benchmark-baseline
          path: .benchmarks-prev

      - name: Run microbenchmarks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-bench-secret-key
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost
          DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:3000
          POSTGRES_DB: vizhome
          POSTGRES_USER: vizhome
          POSTGRES_PASSWORD: vizhome
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          USE_S3: "False"
          STRIPE_WEBHOOK_SECRET: whsec_bench
        run: |
          pytest benchmarks/test_perf.py \
            --benchmark-only \
            --benchmark-json=benchmark-output.json \
            --benchmark-save=baseline \
            -o "addopts=-ra --strict-markers" \
            -v

      - name: Show summary
        if: always()
        run: |
          test -f benchmark-output.json && \
            python -c "
          import json, sys
          data = json.load(open('benchmark-output.json'))
          print('=== Bench summary ===')
          for b in data.get('benchmarks', []):
              name = b['name']
              mean_ms = b['stats']['mean'] * 1000
              stddev_ms = b['stats']['stddev'] * 1000
              print(f'{name:60s}  mean={mean_ms:8.2f} ms  stddev={stddev_ms:6.2f} ms')
          " || echo "Pas de fichier de sortie genere"

      - name: Compare against previous baseline (best effort)
        if: steps.download-baseline.outcome == 'success'
        continue-on-error: true
        run: |
          if [ -d ".benchmarks-prev" ]; then
            cp -r .benchmarks-prev/* .benchmarks/ || true
            pytest benchmarks/test_perf.py \
              --benchmark-only \
              --benchmark-compare \
              --benchmark-compare-fail=mean:30% || true
          fi

      - name: Upload benchmark JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            benchmark-output.json
            .benchmarks/
          retention-days: 90

      - name: Save baseline for next run
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: .benchmarks/
          retention-days: 90
          overwrite: true
