name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Lint Python ─────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt

      - run: pip install ruff
      - run: ruff check src/
      - run: ruff format --check src/

  # ─── 2. Type check (mypy) ──────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true # mypy strict pas encore atteint à 100 %
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt

      - name: Install deps
        run: |
          pip install -r src/requirements.txt
          pip install -r src/requirements-dev.txt mypy

      - name: mypy
        working-directory: src
        run: mypy --config-file ../pyproject.toml . || true

  # ─── 3. Tests + coverage ───────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vizhome
          POSTGRES_USER: vizhome
          POSTGRES_PASSWORD: vizhome
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vizhome"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: pip install -r src/requirements-dev.txt

      - name: Run pytest + coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost
          DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:3000
          POSTGRES_DB: vizhome
          POSTGRES_USER: vizhome
          POSTGRES_PASSWORD: vizhome
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          USE_S3: "False"
          STRIPE_WEBHOOK_SECRET: whsec_test
        working-directory: src
        run: |
          pytest -v --cov=apps --cov-report=xml --cov-report=term \
            --junitxml=../pytest-results.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            src/coverage.xml
            pytest-results.xml
          retention-days: 7

      - name: Upload to Codecov
        if: success() && github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: src/coverage.xml
          fail_ci_if_error: false

  # ─── 4. Build & smoke-test Docker image ────────────────────────────────
  docker-build:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: vizhome-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect layers + size
        run: |
          docker images vizhome-backend:ci-${{ github.sha }} \
            --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}"
          docker history vizhome-backend:ci-${{ github.sha }} --no-trunc \
            --format "table {{.CreatedSince}}\t{{.Size}}\t{{.CreatedBy}}" | head -20

      - name: Run django check inside image
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=config.settings.test \
            -e DJANGO_SECRET_KEY=ci-smoke \
            -e DJANGO_DEBUG=False \
            -e DJANGO_ALLOWED_HOSTS=* \
            -e POSTGRES_DB=vizhome -e POSTGRES_USER=vizhome \
            -e POSTGRES_PASSWORD=vizhome -e POSTGRES_HOST=localhost \
            vizhome-backend:ci-${{ github.sha }} \
            python manage.py check || echo "::warning::django check non-bloquant"

  # ─── 5. Scan vulnérabilités Trivy ──────────────────────────────────────
  trivy:
    name: Trivy vuln scan
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: vizhome-backend:trivy-${{ github.sha }}
          cache-from: type=gha

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: vizhome-backend:trivy-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-backend
