name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check src/

      - name: ruff format --check
        run: ruff format --check src/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vizhome
          POSTGRES_USER: vizhome
          POSTGRES_PASSWORD: vizhome
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vizhome"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: pip install -r src/requirements-dev.txt

      - name: Run pytest
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost
          DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:3000
          POSTGRES_DB: vizhome
          POSTGRES_USER: vizhome
          POSTGRES_PASSWORD: vizhome
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          USE_S3: "False"
          STRIPE_WEBHOOK_SECRET: whsec_test
        working-directory: src
        run: pytest --cov=apps --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: src/coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: vizhome-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
