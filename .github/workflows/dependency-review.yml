name: Dependency Review

# Scanne les deps Python (requirements.txt + requirements-dev.txt) ajoutées
# ou modifiées par une PR. Bloque si CVE high+ détectée.

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: depreview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Refuse les licences incompatibles avec un SaaS commercial proprio.
          # AGPL est volontairement bloquée (incompatible avec proprio fermé).
          deny-licenses: AGPL-3.0, GPL-2.0, GPL-3.0
          comment-summary-in-pr: always
