# Production : à déployer sur un serveur self-hosted (VPS, OVH, Hetzner…).
#
# Pré-requis :
# - Avoir un domaine pointant vers le serveur (DNS A record)
# - Adapter les hosts (Traefik Host rules) dans les labels ci-dessous
# - Renseigner .env.prod (cf .env.example)
#
# Démarrage :
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Le reverse proxy Traefik fournit automatiquement HTTPS via Let's Encrypt.

services:
  traefik:
    image: traefik:v3.2
    container_name: vizhome-traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: vizhome-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vizhome-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: vizhome-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_S3_SECRET_KEY}
      # Permet à MinIO de générer des URLs avec le bon hostname public
      MINIO_SERVER_URL: https://${MINIO_PUBLIC_HOST}
      MINIO_BROWSER_REDIRECT_URL: https://${MINIO_CONSOLE_HOST}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # API S3 sur cdn.vizhome.fr
      - traefik.http.routers.minio-api.rule=Host(`${MINIO_PUBLIC_HOST}`)
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-api.service=minio-api
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
      # Console MinIO sur minio.vizhome.fr (à protéger via firewall ou auth)
      - traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_HOST}`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-console.service=minio-console
      - traefik.http.services.minio-console.loadbalancer.server.port=9001

  minio-init:
    image: minio/mc:latest
    container_name: vizhome-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_S3_ACCESS_KEY: ${MINIO_S3_ACCESS_KEY}
      MINIO_S3_SECRET_KEY: ${MINIO_S3_SECRET_KEY}
      MINIO_S3_BUCKET_NAME: ${MINIO_S3_BUCKET_NAME}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_S3_ACCESS_KEY} $${MINIO_S3_SECRET_KEY};
      mc mb --ignore-existing local/$${MINIO_S3_BUCKET_NAME};
      mc anonymous set download local/$${MINIO_S3_BUCKET_NAME};
      echo '✓ Bucket initialisé : '$${MINIO_S3_BUCKET_NAME};
      "

  api:
    image: ${VIZHOME_IMAGE:-vizhome-backend:latest}
    container_name: vizhome-api
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.prod
    environment:
      RUN_MIGRATIONS: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${API_HOST}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=8000

  celery:
    image: ${VIZHOME_IMAGE:-vizhome-backend:latest}
    container_name: vizhome-celery
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config worker -l info --concurrency=4
    env_file:
      - .env.prod
    environment:
      RUN_MIGRATIONS: "0"
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    image: ${VIZHOME_IMAGE:-vizhome-backend:latest}
    container_name: vizhome-celery-beat
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.prod
    environment:
      RUN_MIGRATIONS: "0"
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    name: vizhome_postgres_data_prod
  redis_data:
    name: vizhome_redis_data_prod
  minio_data:
    name: vizhome_minio_data_prod
  traefik_letsencrypt:
    name: vizhome_traefik_letsencrypt
