openapi: 3.0.3
info:
  title: VizHome API
  version: 1.0.0
  description: API REST de la plateforme VizHome — visualisation 3D architecturale
    propulsée par IA (Gemini).
  contact:
    email: support@vizhome.fr
  license:
    name: Propriétaire
paths:
  /api/v1/auth/2fa/verify:
    post:
      operationId: auth_2fa_verify_create
      description: 'Étape 2 du login : échange challenge_token + code TOTP contre
        des JWT.'
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/forgot-password:
    post:
      operationId: auth_forgot_password_create
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/login:
    post:
      operationId: auth_login_create
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout:
    post:
      operationId: auth_logout_create
      description: Blacklist le refresh token et marque la session comme révoquée.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/oauth/{provider}/exchange:
    post:
      operationId: auth_oauth_exchange_create
      description: |-
        Échange un payload OAuth (id_token ou code) contre nos JWT.

        POST /auth/oauth/google/exchange   { "id_token": "..." }
        POST /auth/oauth/github/exchange   { "code": "...", "redirect_uri": "..." }
      parameters:
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/refresh:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/register:
    post:
      operationId: auth_register_create
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/reset-password:
    post:
      operationId: auth_reset_password_create
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/billing/plans:
    get:
      operationId: billing_plans_retrieve
      description: GET /api/v1/billing/plans — catalogue public des plans VizHome.
      tags:
      - billing
      responses:
        '200':
          description: No response body
  /api/v1/me/:
    get:
      operationId: me_retrieve
      description: GET = profil complet (user + stats + preferences), PATCH = update
        profil.
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: me_update
      description: GET = profil complet (user + stats + preferences), PATCH = update
        profil.
      tags:
      - me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: me_partial_update
      description: GET = profil complet (user + stats + preferences), PATCH = update
        profil.
      tags:
      - me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateMeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateMeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateMeRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateMe'
          description: ''
  /api/v1/me/2fa/disable:
    post:
      operationId: me_2fa_disable_create
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/me/2fa/setup:
    post:
      operationId: me_2fa_setup_create
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/me/2fa/verify-setup:
    post:
      operationId: me_2fa_verify_setup_create
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/me/change-password:
    post:
      operationId: me_change_password_create
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/me/invoices:
    get:
      operationId: me_invoices_retrieve
      description: GET /api/v1/me/invoices — liste les factures Stripe du user.
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/me/payment-methods:
    get:
      operationId: me_payment_methods_retrieve
      description: GET /api/v1/me/payment-methods — liste les cartes du user.
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/me/preferences:
    get:
      operationId: me_preferences_retrieve
      description: GET/PATCH des préférences.
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
          description: ''
    put:
      operationId: me_preferences_update
      description: GET/PATCH des préférences.
      tags:
      - me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferencesRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserPreferencesRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserPreferencesRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
          description: ''
    patch:
      operationId: me_preferences_partial_update
      description: GET/PATCH des préférences.
      tags:
      - me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserPreferencesRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserPreferencesRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserPreferencesRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
          description: ''
  /api/v1/me/sessions:
    get:
      operationId: me_sessions_list
      parameters:
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserSessionList'
          description: ''
  /api/v1/me/sessions/{id}:
    delete:
      operationId: me_sessions_destroy
      description: Révoque une session par son id (blacklist le refresh token associé).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/me/subscription:
    get:
      operationId: me_subscription_retrieve
      description: GET /api/v1/me/subscription — état courant de la subscription du
        user.
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/me/subscription/cancel:
    post:
      operationId: me_subscription_cancel_create
      description: POST /api/v1/me/subscription/cancel — programme l'annulation en
        fin de période.
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/me/subscription/checkout:
    post:
      operationId: me_subscription_checkout_create
      description: POST /api/v1/me/subscription/checkout — crée une Checkout Session
        Stripe.
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/:
    get:
      operationId: projects_list
      parameters:
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectListList'
          description: ''
    post:
      operationId: projects_create
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectCreateUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCreateUpdate'
          description: ''
  /api/v1/projects/{id}:
    get:
      operationId: projects_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
          description: ''
    put:
      operationId: projects_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectCreateUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCreateUpdate'
          description: ''
    patch:
      operationId: projects_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProjectCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProjectCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProjectCreateUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCreateUpdate'
          description: ''
    delete:
      operationId: projects_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/projects/{id}/annotations:
    get:
      operationId: projects_annotations_list
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAnnotationList'
          description: ''
    post:
      operationId: projects_annotations_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
  /api/v1/projects/{id}/annotations/{annotation_id}:
    get:
      operationId: projects_annotations_retrieve
      parameters:
      - in: path
        name: annotation_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
    put:
      operationId: projects_annotations_update
      parameters:
      - in: path
        name: annotation_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
    patch:
      operationId: projects_annotations_partial_update
      parameters:
      - in: path
        name: annotation_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAnnotationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAnnotationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAnnotationRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
    delete:
      operationId: projects_annotations_destroy
      parameters:
      - in: path
        name: annotation_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/projects/{id}/duplicate:
    post:
      operationId: projects_duplicate_create
      description: |-
        POST /projects/{id}/duplicate[?copy_assets=true]

        Par défaut, copie : projet + scene + annotations.
        Avec ?copy_assets=true, copie aussi les modèles 3D via copy_object MinIO
        (server-side, rapide, mais incrémente le storage usage).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/models:
    get:
      operationId: projects_models_retrieve
      description: |-
        POST /projects/{id}/models — upload multipart classique (< 10MB).
        GET — liste tous les modèles du projet.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: projects_models_create
      description: |-
        POST /projects/{id}/models — upload multipart classique (< 10MB).
        GET — liste tous les modèles du projet.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/models/{model_id}:
    get:
      operationId: projects_models_retrieve_2
      description: GET/PATCH/DELETE /projects/{pk}/models/{model_id}.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: model_id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportedModel'
          description: ''
    put:
      operationId: projects_models_update
      description: GET/PATCH/DELETE /projects/{pk}/models/{model_id}.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: model_id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportedModelUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ImportedModelUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImportedModelUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportedModelUpdate'
          description: ''
    patch:
      operationId: projects_models_partial_update
      description: GET/PATCH/DELETE /projects/{pk}/models/{model_id}.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: model_id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedImportedModelUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedImportedModelUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedImportedModelUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportedModelUpdate'
          description: ''
    delete:
      operationId: projects_models_destroy
      description: GET/PATCH/DELETE /projects/{pk}/models/{model_id}.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: model_id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/projects/{id}/models/confirm:
    post:
      operationId: projects_models_confirm_create
      description: |-
        POST /projects/{id}/models/confirm
        Appelé après l'upload PUT direct par le frontend. Vérifie que le fichier
        existe bien sur MinIO et crée l'ImportedModel.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/models/upload-url:
    post:
      operationId: projects_models_upload_url_create
      description: |-
        POST /projects/{id}/models/upload-url
        Renvoie une URL pré-signée pour PUT direct du fichier vers MinIO.
        Le frontend doit ensuite appeler /confirm pour enregistrer en DB.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/scene:
    get:
      operationId: projects_scene_retrieve
      description: |-
        GET /projects/{id}/scene — lit le JSON state Three.js
        PUT /projects/{id}/scene — sauvegarde complète (incrémente la version).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scene'
          description: ''
    put:
      operationId: projects_scene_update
      description: |-
        GET /projects/{id}/scene — lit le JSON state Three.js
        PUT /projects/{id}/scene — sauvegarde complète (incrémente la version).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SceneRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SceneRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SceneRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scene'
          description: ''
    patch:
      operationId: projects_scene_partial_update
      description: |-
        GET /projects/{id}/scene — lit le JSON state Three.js
        PUT /projects/{id}/scene — sauvegarde complète (incrémente la version).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
