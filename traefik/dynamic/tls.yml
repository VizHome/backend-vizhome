# =============================================================================
# Options TLS — cipher suites et versions minimum.
#
# Référence : Mozilla SSL Configuration Generator (profil "modern" + intermédiaire)
# https://ssl-config.mozilla.org/
#
# `modern` : TLS 1.3 uniquement, navigateurs récents (2020+)
# `intermediate` : TLS 1.2+, fallback large compat (navigateurs anciens)
# =============================================================================

tls:
  options:
    # Profil moderne : TLS 1.3 only (compat ~99% trafic 2026)
    modern:
      minVersion: VersionTLS13
      sniStrict: true

    # Fallback intermédiaire si un client legacy se plaint
    # (à appliquer ponctuellement via labels sur un router spécifique)
    intermediate:
      minVersion: VersionTLS12
      cipherSuites:
        # TLS 1.3 (négociation automatique, ces lignes n'agissent que sur 1.2)
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      curvePreferences:
        - CurveP256
        - X25519
      sniStrict: true
