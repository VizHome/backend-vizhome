sonar.projectKey=VizHome_backend-vizhome
sonar.organization=vizhome

# ─── Sources & exclusions ────────────────────────────────────────────────
sonar.sources=src
sonar.exclusions=**/migrations/**,**/tests/**,**/*.test.py,**/conftest.py,**/__pycache__/**

# ─── Tests ───────────────────────────────────────────────────────────────
sonar.tests=src
sonar.test.inclusions=**/tests/**,**/test_*.py
sonar.python.version=3.13
sonar.python.coverage.reportPaths=src/coverage.xml
sonar.python.xunit.reportPath=pytest-results.xml

# ─── Encoding ────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ─── Branche / PR ────────────────────────────────────────────────────────
# Automatique via SonarSource/sonarqube-scan-action (lit GITHUB_BASE_REF)
