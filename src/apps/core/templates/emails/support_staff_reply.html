{% extends 'emails/base_email.html' %}
{% block content %}
<h1 style="margin:0 0 16px 0; font-size:20px; font-weight:700; color:#18181b;">Nouvelle réponse du support</h1>
<p style="margin:0 0 12px 0;">Bonjour {% if pseudo %}@{{ pseudo }}{% endif %},</p>
<p style="margin:0 0 16px 0;">
  L'équipe VizHome a répondu à ton ticket
  <strong>#{{ ticket_id }} &middot; {{ ticket_subject }}</strong> :
</p>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0">
  <tr>
    <td style="background-color:#fafafa; border-left:3px solid #18181b; border-radius:0 8px 8px 0; padding:14px 16px; font-size:14px; line-height:1.6; color:#52525b;">
      {{ body_preview|linebreaksbr }}
    </td>
  </tr>
</table>
{% endblock %}
