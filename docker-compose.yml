services:
  postgres:
    image: postgres:16-alpine
    container_name: vizhome-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vizhome-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # pgweb — UI web légère pour browse/query la DB Postgres en dev.
  # Accessible sur http://localhost:8081 (sessions auto-connectées via env vars).
  # Aucune auth → exposé uniquement en local, jamais en prod.
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: vizhome-pgweb
    environment:
      PGWEB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      PGWEB_SESSIONS: "1"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: vizhome-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_S3_SECRET_KEY}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web (http://localhost:9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  minio-init:
    # Job one-shot : crée le bucket et le rend lisible publiquement
    image: minio/mc:latest
    container_name: vizhome-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_S3_ACCESS_KEY: ${MINIO_S3_ACCESS_KEY}
      MINIO_S3_SECRET_KEY: ${MINIO_S3_SECRET_KEY}
      MINIO_S3_BUCKET_NAME: ${MINIO_S3_BUCKET_NAME}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_S3_ACCESS_KEY} $${MINIO_S3_SECRET_KEY};
      mc mb --ignore-existing local/$${MINIO_S3_BUCKET_NAME};
      mc anonymous set download local/$${MINIO_S3_BUCKET_NAME};
      echo '✓ Bucket initialisé : '$${MINIO_S3_BUCKET_NAME};
      "

  mailpit:
    # Fake SMTP en dev — catch tous les emails, UI web sur :8025
    # https://mailpit.axllent.org/
    image: axllent/mailpit:latest
    container_name: vizhome-mailpit
    ports:
      - "1025:1025"   # SMTP (utilisé par Django)
      - "8025:8025"   # Web UI (http://localhost:8025)
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpit_data:/data
    restart: unless-stopped

  api:
    container_name: vizhome-api
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  celery:
    container_name: vizhome-celery
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: celery -A config worker -l info --concurrency=2
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
    name: vizhome_postgres_data
  minio_data:
    name: vizhome_minio_data
  mailpit_data:
    name: vizhome_mailpit_data
